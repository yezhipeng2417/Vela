name: Collect & Deploy

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - 'public/data/**'
      - 'marketplace/**'

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Collect marketplace data
        run: npx tsx scripts/collect.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        run: npm run build

      - name: Commit changes to main
        run: |
          # Copy build output to marketplace/ directory
          rm -rf marketplace
          mkdir -p marketplace
          cp -r dist/* marketplace/

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/marketplaces.json marketplace/
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "chore: update marketplace data & build [skip ci]"
            git push
          fi
