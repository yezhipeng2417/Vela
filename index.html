<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vela - Legal</title>
    <style>
        :root {
            --bg: #0e0e12;
            --card: #1a1a24;
            --card-hover: #22222e;
            --border: rgba(255,255,255,0.06);
            --accent: #7c6ef0;
            --accent2: #e87e9a;
            --accent3: #56bfb5;
            --text: #e8e6f0;
            --text2: #9490a8;
            --glow: rgba(124,110,240,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            padding: 80px 24px 40px;
        }
        .logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px var(--glow);
        }
        .hero h1 {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .hero p {
            color: var(--text2);
            font-size: 17px;
        }
        .cards {
            display: flex;
            gap: 20px;
            padding: 20px 24px 80px;
            max-width: 720px;
            width: 100%;
        }
        .card {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 24px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .card:hover {
            background: var(--card-hover);
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 12px 40px var(--glow);
        }
        .card-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        .card-icon.privacy { background: rgba(86,191,181,0.15); }
        .card-icon.terms { background: rgba(124,110,240,0.15); }
        .card h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .card p { font-size: 14px; color: var(--text2); line-height: 1.5; }
        .card .arrow {
            margin-top: 16px;
            color: var(--accent);
            font-size: 14px;
            font-weight: 500;
        }
        .footer {
            color: var(--text2);
            font-size: 13px;
            padding-bottom: 40px;
        }
        @media (max-width: 540px) {
            .cards { flex-direction: column; }
            .hero h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">V</div>
        <h1>Vela</h1>
        <p>Legal Information</p>
    </div>

    <div class="cards">
        <a class="card" href="privacy.html">
            <div class="card-icon privacy">&#128737;</div>
            <h2>Privacy Policy</h2>
            <p>Learn how Vela handles your data, HealthKit integration, and third-party services.</p>
            <span class="arrow">Read More &rarr;</span>
        </a>
        <a class="card" href="terms.html">
            <div class="card-icon terms">&#9878;</div>
            <h2>Terms of Use</h2>
            <p>Review the terms governing your use of Vela, AI content, and subscriptions.</p>
            <span class="arrow">Read More &rarr;</span>
        </a>
    </div>

    <div class="footer">Last updated: March 2026</div>
</body>
</html>
